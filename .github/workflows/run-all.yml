name: run-all   # 외부 핑거(cron-job.org 등)로 트리거 — 채용+기사+인사이트 일괄 수집/커밋. GitHub cron 드롭 우회

on:
  repository_dispatch:
    types: [run-all]      # 외부에서 POST /repos/.../dispatches {"event_type":"run-all"}
  workflow_dispatch: {}    # 수동 실행

permissions:
  contents: write
concurrency:
  group: data-commit       # 다른 스크랩 워크플로와 push 직렬화(충돌 방지)
  cancel-in-progress: false

jobs:
  run-all:
    runs-on: ubuntu-latest
    timeout-minutes: 25      # 정상 ~10분. 행 걸려도 25분에 자동 종료 → data-commit 그룹 장기 점유 방지(수집 정지 사고 재발 차단)
    env:
      TZ: Asia/Seoul
      VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}   # 뉴스 의미 군집(없으면 어휘 군집만)
      VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}   # 웹 푸시 서명 개인키(없으면 notifier가 발송 스킵)
      SUBS_READ_TOKEN: ${{ secrets.SUBS_READ_TOKEN }}       # 구독 저장소(Worker) /list Bearer
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: pip }
      - run: pip install -r requirements.txt
      - name: Install Chromium (인사이트 렌더용)
        run: python -m playwright install --with-deps chromium
      - name: Scrape all (채용+기사+인사이트)
        run: python -m src.export
      - name: Send push notifications (새 공고 → 구독자)
        if: always()    # export 부분실패해도 기존 notified=False 발송 시도. enabled=false/키 없으면 내부 스킵
        run: python -m src.notifier || true   # 발송 실패가 커밋/전체 run을 막지 않음(견고성)
      - name: Commit data
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/jobs.json docs/data/news.json docs/data/insights.json \
                  docs/data/status.json docs/data/notify_status.json \
                  news_vectors.json state.json docs/sitemap.xml
          if git diff --staged --quiet; then echo "변경 없음"; else
            git commit -m "auto: run-all 통합 수집"
            # 재생성 산출물(jobs/news/insights/status·캐시)은 '최신 수집이 이김'이 정확한 의미.
            # 외부/수동 푸시가 run에 겹쳐 origin이 전진하면 rebase가 JSON에서 충돌 → -X theirs로
            # 이번 수집본을 채택해 자동 해소(전체실패 금지). 충돌 미발생 시 영향 없음.
            git pull --rebase --autostash -X theirs origin "${{ github.ref_name }}"
            git push
          fi
