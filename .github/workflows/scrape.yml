name: scrape-jobs   # 채용공고 — 30분마다

on:
  workflow_dispatch: {}    # 수동 전용 — 정기 수집은 외부 핑거→run-all이 담당(cron 중복 제거)
  push:
    branches: [main, master]
    paths: ["src/**", "config.yaml", ".github/workflows/scrape.yml"]

permissions:
  contents: write
concurrency:
  group: data-commit          # 세 워크플로 공유 → push 직렬화(충돌 방지)
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul   # 금일·마감일을 한국 시간 기준으로
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"   # Node20 deprecation 경고 제거(액션 Node24 강제)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: pip }
      - run: pip install -r requirements.txt
      - run: python -m src.export --part jobs
      - name: Commit jobs.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/jobs.json docs/data/status.json state.json docs/sitemap.xml
          if git diff --staged --quiet; then echo "변경 없음"; else
            git commit -m "auto: 채용 갱신"
            git pull --rebase --autostash -X theirs origin "${{ github.ref_name }}"
            git push
          fi
