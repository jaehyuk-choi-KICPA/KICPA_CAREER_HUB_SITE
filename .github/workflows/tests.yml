name: tests   # 순수 로직(필터·분류·상태기계·날짜) 단위 테스트 — push/PR 시 자동 실행

on:
  push:
    paths:
      - "src/**"
      - "tests/**"
      - "config.yaml"
      - ".github/workflows/tests.yml"
  pull_request: {}
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: pip }
      - name: Install deps (브라우저 다운로드는 불필요 — 패키지만)
        run: pip install -r requirements.txt pytest
      - name: Run unit tests
        run: python -m pytest tests/ -v
