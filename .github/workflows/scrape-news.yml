name: scrape-news   # 기사 — 2시간마다(1주일 지난 기사 자동 제외)

on:
  schedule:
    - cron: "0 */2 * * *"   # 2시간마다(업계 기사)
  workflow_dispatch: {}

permissions:
  contents: write
concurrency:
  group: data-commit
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul   # 기사 최근(7일) 컷오프를 한국 시간 기준으로
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: pip }
      - run: pip install -r requirements.txt
      - run: python -m src.export --part news
      - name: Commit news.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/news.json
          if git diff --staged --quiet; then echo "변경 없음"; else
            git commit -m "auto: 기사 갱신"
            git pull --rebase --autostash origin "${{ github.ref_name }}"
            git push
          fi
