name: scrape-insights   # 빅펌 인사이트 — 하루 1회(JS 렌더라 Chromium 필요)

on:
  schedule:
    - cron: "0 0 * * *"   # 매일 00:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write
concurrency:
  group: data-commit
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: pip }
      - run: pip install -r requirements.txt
      - name: Install Chromium
        run: python -m playwright install --with-deps chromium
      - run: python -m src.export --part insights
      - name: Commit insights.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/insights.json
          if git diff --staged --quiet; then echo "변경 없음"; else
            git commit -m "auto: 인사이트 갱신 [skip ci]"
            git pull --rebase --autostash origin "${{ github.ref_name }}"
            git push
          fi
